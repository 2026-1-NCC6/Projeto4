name: smart_feeder
description: Smart pet feeder monitoring application for FECAP project.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase - Versões estáveis e compatíveis entre si
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.4

  # Comunicação IoT
  mqtt_client: ^10.5.0

  # Utilidades e UI
  provider: ^6.1.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true